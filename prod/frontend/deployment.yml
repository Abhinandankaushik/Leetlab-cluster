apiVersion: apps/v1
kind: Deployment
metadata:
  name: prod-frontend
  namespace: leetlab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prod-frontend
  template:
    metadata:
      labels:
        app: prod-frontend
    spec:
      containers:
        - name: frontend
          # The CD workflow rewrites this tag on every deploy.
          image: abhii1716/leetlab-frontend:e39dd0d0dd5a1752247ade37b9877fb767da1938
          ports:
            - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: prod-frontend
  namespace: leetlab
spec:
  type: LoadBalancer
  selector:
    app: prod-frontend
  ports:
    - port: 80
      targetPort: 5173
