apiVersion: apps/v1
kind: Deployment
metadata:
  name: leetlab-frontend
  namespace: leetlab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leetlab-frontend
  template:
    metadata:
      labels:
        app: leetlab-frontend
    spec:
      containers:
        - name: frontend
          # The CD workflow rewrites this tag on every deploy.
          image: abhinandankaushik/leetlab-frontend:latest
          ports:
            - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: leetlab
spec:
  type: LoadBalancer
  selector:
    app: leetlab-frontend
  ports:
    - port: 80
      targetPort: 5173
