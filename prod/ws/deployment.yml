apiVersion: apps/v1
kind: Deployment
metadata:
  name: prod-ws
  namespace: leetlab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prod-ws
  template:
    metadata:
      labels:
        app: prod-ws
    spec:
      containers:
        - name: ws
          # The CD workflow rewrites this tag on every deploy.
          image: abhii1716/leetlab-ws:4513f777775fab46d15b333effc7ec8074008bfe
          ports:
            - containerPort: 4001
          env:
            - name: WS_PORT
              value: "4001"
--- 

apiVersion: v1
kind: Service
metadata:
  name: prod-ws
  namespace: leetlab
spec:
  selector:
    app: prod-ws
  ports:
    - port: 4001
      targetPort: 4001